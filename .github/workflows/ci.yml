name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check .

      - name: Flake8 lint
        run: flake8 .

      - name: Black formatting check
        run: black --check .

      - name: Lint
        run: ruff check .

      - name: Unit tests
        run: pytest -q

      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t oci-costwatch:ci .

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: 'oci-costwatch:ci'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Secrets scan (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        codex/build-oci-costwatch-open-source-project-j4conn
      - name: Security scan (pip-audit, advisory)
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip-audit -r requirements.txt -f json -o pip-audit-report.json
          pip-audit -r requirements.txt

      - name: Upload security scan artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.json
          if-no-files-found: ignore

      - name: Security scan (pip-audit)
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt
         main
