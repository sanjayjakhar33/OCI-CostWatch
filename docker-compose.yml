services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: oci-costwatch-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    container_name: oci-costwatch-postgres
    environment:
      POSTGRES_DB: costwatch
      POSTGRES_USER: costwatch
      POSTGRES_PASSWORD: costwatch
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: oci-costwatch-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:11.2.2
    container_name: oci-costwatch-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  redis:
    image: redis:7-alpine
    container_name: oci-costwatch-redis
    ports:
      - "6379:6379"

  celery:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: oci-costwatch-celery
  celery-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: oci-costwatch-celery-worker
    command: celery -A backend.tasks.celery_app.celery worker --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis
      - postgres

  celery-beat:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: oci-costwatch-celery-beat
    command: celery -A backend.tasks.celery_app.celery beat --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis
      - postgres

volumes:
  pgdata:
